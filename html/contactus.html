<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earth Bound Jewelry Co-Products</title>
        <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
 <header>
        <div>
            <img src="/pictures/logo.png" id="logo" alt="Earth Bound Jewelry Logo">
        </div>
        <div>
            <h1>Earth Bound Jewelry Co</h1>
        </div>
    </header>
    <nav>
        <a href="/index.html">Home</a>
        <a href="product.html">Shop</a>
        <a href="contactus.html">Contact</a>
      
    </nav>
    
    <h2 id="contactus">Need to contact us? Fill out this form and we'll get back to you shortly.</h2>


        <form>
            <div>
                <label for="email">Email*</label><br>
                <input type="email" id="email" name="email">
            </div>

            <div>
                <label for="firstName">First Name*</label><br>
                <input type="text" id="firstName" name="firstName">
            </div>

            <div>
                <label for="lastName">Last Name</label><br>
                <input type="text" id="lastName" name="lastName">
            </div>

            <div>
                <label for="phone">Phone Number*</label><br>
                <input type="tel" id="phone" name="phone">
            </div>

            <div>
                <label for="message">Write your message here...</label><br>
                <textarea id="message" name="message" rows="6"></textarea>
            </div>
        </form>
  
    <footer>
        <div>
            <p>Follow our socials!</p>
            <a href="#">Instagram</a>
            <a href="#">Facebook</a>
        </div>
    </footer>

</body>
</html>
